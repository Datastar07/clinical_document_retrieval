document:
  source_pdf: "data/raw/PT-55188 - Claudette Johnson .pdf"
  document_id: "PT-55188"
  patient_id: "PT-55188"
  patient_name: "Claudette Johnson"
  processing_version: "2.0.0"

paths:
  processed_dir: "data/processed"
  index_dir: "data/indexes"
  evaluation_path: "data/evaluation/evaluation_dataset.json"
  outputs_dir: "outputs"
  page_images_dir: "/root/clinical_artifacts/page_images"
  visual_mv_dir: "/root/clinical_artifacts/visual_mv"
  sqlite_path: "/root/clinical_artifacts/indexes/clinical_meta.db"
  qdrant_path: "/root/clinical_artifacts/qdrant"

extraction:
  header_footer_repeat_threshold: 0.6
  min_text_chars_per_page: 40
  ocr_enabled: true
  ocr_dpi: 200
  ocr_lang: eng
  ocr_max_pages: null
  render_pages: true
  render_dpi: 144
  render_format: jpeg
  render_quality: 85

structure:
  # Pluggable parsers: auto | synthetic_soap | generic | docling
  parser: auto
  docling_enabled: true
  docling_fallback: synthetic_soap
  docling_mode: batched
  docling_batch_pages: 50
  docling_max_pages_inline: 200
  lexicon_path: configs/clinical_lexicon.yaml

chunking:
  section_max_chars: 2200
  section_overlap_chars: 180
  atomic_max_chars: 600
  encounter_summary_max_chars: 4500
  create_key_facts: true
  create_page_visual_chunks: true

retrieval:
  bm25_top_k: 60
  dense_top_k: 60
  exact_top_k: 80
  structured_top_k: 40
  visual_top_k: 30
  fusion_top_k: 80
  rerank_top_k: 50
  final_top_k: 10
  rrf_k: 60
  profile: full  # api | full
  lazy_visual_threshold: 0.08
  enable_bm25: true
  enable_dense: true
  enable_exact: true
  enable_structured: true
  enable_visual: true
  channel_weights:
    lexical: 0.35
    dense: 0.25
    structured: 0.30
    visual: 0.10
  metadata_boost:
    date_match: 0.12
    section_match: 0.08
    entity_match: 0.08
    numeric_match: 0.10
    encounter_type_match: 0.05
    provider_match: 0.05
  score_weights:
    reranker: 0.65
    hybrid: 0.20
    metadata: 0.15

models:
  embedding_model: "Qwen/Qwen3-Embedding-0.6B"
  embedding_batch_size: 32
  # auto = cuda if available else cpu; override with --device cuda|cpu
  embedding_device: "auto"
  embedding_dim: 1024
  reranker_model: "Qwen/Qwen3-Reranker-0.6B"
  reranker_batch_size: 8
  use_reranker: true
  visual_model: "vidore/colqwen2.5-v0.2"
  visual_batch_size: 1
  visual_enabled: true

qdrant:
  # Dedicated clinical-qdrant2 container
  url: "http://127.0.0.1:6340"
  path: "/root/clinical_artifacts/qdrant"
  dense_collection: "clinical_dense"
  visual_collection: "clinical_visual"
  prefer_grpc: false

evaluation:
  top_k: 10
  fuzzy_threshold: 0.82
  token_overlap_threshold: 0.70
